  const denName = DEN==='paid'?'sub đã thu tiền (status≠created)':'TẤT CẢ sub created (kể cả chưa charge)';
  document.getElementById('denInfo').textContent='Mẫu số hiện tại: '+denName;
  document.getElementById('note').innerHTML=`Cohort gom theo <b>NGÀY giờ VN (UTC+7)</b>, mới→cũ. <b>Mẫu số R = ${denName}</b>. Tử số = sub của cohort có renewals ≥k (renew tính từ chính sub đó: <code>period_starts_at</code> vs <code>created_at</code>). R chỉ hiện khi cohort đủ tuổi (R1≥7d, R2≥14d, R3≥21d). renewals clamp theo tuổi.`;
  const rows=HIDE?COHORTS.filter(c=>c.age>=7):COHORTS;
  const T=rows.reduce((a,c)=>{['total','paid','active','cancelled','created','unpaid','week','month','year','r1','r2','r3','cycles'].forEach(k=>a[k]=(a[k]||0)+c[k]);return a;},{});
  const D=DEN==='paid'?T.paid:T.total;
  document.getElementById('kpis').innerHTML=[
    ['Sub mới (tổng)',T.total.toLocaleString(),''],
    [DEN==='paid'?'Đã thu tiền (mẫu số)':'Tất cả created (mẫu số)',D.toLocaleString(),''],
    ['R1 thô (≥1)',D?(T.r1/D*100).toFixed(1)+'%':'–','color:var(--acc)'],
    ['R2 thô (≥2)',D?(T.r2/D*100).toFixed(1)+'%':'–','color:var(--good)'],
    ['R3 thô (≥3)',D?(T.r3/D*100).toFixed(1)+'%':'–','color:var(--good)'],
    ['Σ kỳ renew',T.cycles.toLocaleString(),''],
  ].map(k=>`<div class="kpi"><div class="v" style="${k[2]}">${k[1]}</div><div class="l">${k[0]}</div></div>`).join('');
  document.querySelector('#tbl thead').innerHTML='<tr><th class="c">Cohort (VN)</th><th>Tuổi(d)</th><th>Sub mới</th><th>Đã thu</th><th>Active</th><th>Cancel</th><th>Created</th><th>Unpaid</th><th>T/Th/N</th><th>≥1</th><th>≥2</th><th>≥3</th><th>Σ</th><th>R1</th><th>R2</th><th>R3</th></tr>';
  const totR=`<tr class="tot"><td class="c">TỔNG</td><td></td><td>${T.total}</td><td>${T.paid}</td><td>${T.active}</td><td>${T.cancelled}</td><td>${T.created}</td><td>${T.unpaid}</td><td>${T.week}/${T.month}/${T.year}</td><td>${T.r1}</td><td>${T.r2}</td><td>${T.r3}</td><td>${T.cycles}</td>`+
    [['r1'],['r2'],['r3']].map(x=>`<td>${D?(T[x[0]]/D*100).toFixed(1)+'%':'–'}</td>`).join('')+'</tr>';
  const body=rows.map(c=>{
    const y=c.age<7?' class="young"':'';
    return `<tr${y}><td class="c">${c.d}</td><td>${c.age}</td><td>${c.total}</td><td>${c.paid}</td><td>${c.active}</td><td>${c.cancelled}</td><td class="mut">${c.created}</td><td>${c.unpaid}</td><td class="mut">${c.week}/${c.month}/${c.year}</td><td>${c.r1}</td><td>${c.r2}</td><td>${c.r3}</td><td>${c.cycles}</td>`+
      rcell(c.r1,c,7)+rcell(c.r2,c,14)+rcell(c.r3,c,21)+'</tr>';
  }).join('');
  document.querySelector('#tbl tbody').innerHTML=totR+body;
}
document.querySelectorAll('#den button').forEach(b=>b.onclick=()=>{DEN=b.dataset.d;render();});
document.getElementById('hideYoung').onchange=e=>{HIDE=e.target.checked;render();};
render();
</script></body></html>
